<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timer Pro Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --primary: #2563eb;
            --header-bg: #0f172a;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg: #020617;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }

        /* 移除增減按鈕 */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh;
        }

        /* 頂部面板 */
        header {
            background: var(--header-bg); color: white;
            padding: 15px 30px; display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); z-index: 100;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        
        .action-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        
        select.main-input, input.main-input { 
            padding: 10px 14px; font-size: 1rem; border-radius: 8px; border: 1px solid #334155; 
            background: #1e293b; color: white; outline: none;
        }
        select.main-input option { background: #1e293b; color: white; } /* 修正隱身問題 */
        
        .time-box { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 8px; border: 1px solid #334155; }
        .time-box label { font-size: 0.7rem; opacity: 0.6; font-weight: 800; }
        .time-box input { width: 45px; background: transparent; border: none; color: white; font-size: 1.1rem; text-align: center; font-family: 'JetBrains Mono'; }

        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-icon { background: transparent; border: 1px solid #334155; color: white; cursor: pointer; font-size: 1.2rem; padding: 5px 10px; border-radius: 8px; }

        /* 網格系統 */
        #timerContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px; padding: 20px; overflow-y: auto; align-content: start;
        }

        .timer-card { 
            background: var(--card-bg); border-radius: 12px; padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 10px; transition: 0.2s;
        }
        .timer-card.is-editing { border: 2px solid var(--primary); }
        .timer-card.overtime { border-color: var(--danger); background: rgba(239, 68, 68, 0.05); animation: pulse 2s infinite; }

        /* 放大名稱字體 */
        .timer-name { 
            font-size: 1.4rem; font-weight: 800; border: none; background: transparent; 
            color: var(--text); width: 85%; outline: none;
        }
        
        .timer-display { 
            font-size: 2.4rem; font-family: 'JetBrains Mono'; text-align: center;
            color: var(--primary); font-weight: 700; margin: 5px 0;
        }
        .overtime .timer-display { color: var(--danger); }

        .card-inputs input { 
            width: 40px; background: var(--bg); border: 1px solid var(--border); 
            border-radius: 4px; text-align: center; font-size: 0.9rem; padding: 3px; color: var(--text);
        }

        .btn-group { display: flex; gap: 8px; }
        .btn-group button { flex: 1; padding: 8px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; }
        .btn-start { background: var(--success); color: white; }
        .btn-pause { background: #f59e0b; color: white; }
        .btn-reset { background: #64748b; color: white; }

        /* 常用清單彈窗 */
        #presetModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card-bg); padding: 25px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            z-index: 1000; width: 90%; max-width: 400px; border: 1px solid var(--border);
        }
        #modalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; }
        textarea#presetEditor { width: 100%; height: 150px; margin: 15px 0; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div style="font-size: 1.4rem; font-weight: 800;">⏱️ Multi-Timer Pro</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-icon" id="muteBtn" onclick="toggleMute()">🔊</button>
                <button class="btn-icon" onclick="toggleTheme()">🌓</button>
                <button class="btn-icon" onclick="openPresets()">⚙️</button>
            </div>
        </div>

        <div class="action-row">
            <select id="presetSelect" class="main-input" style="width: 180px;">
                <option value="">快速選擇任務</option>
            </select>
            <input type="text" id="newName" class="main-input" placeholder="手動名稱" style="width: 120px;">
            <div class="time-box">
                <label>H</label><input type="number" id="newHour" value="0">
                <label>M</label><input type="number" id="newMin" value="5">
                <label>S</label><input type="number" id="newSec" value="0">
            </div>
            <button class="btn-add" onclick="addTimer()">＋ 新增項目</button>
        </div>
    </header>

    <div id="timerContainer"></div>

    <div id="modalOverlay" onclick="closePresets()"></div>
    <div id="presetModal">
        <h3 style="margin-top:0">常用清單管理</h3>
        <p style="font-size:0.8rem; color:#888;">請輸入任務名稱，以逗號或換行分隔：</p>
        <textarea id="presetEditor" placeholder="例如：煮麵, 健身, 報告..."></textarea>
        <button class="btn-add" style="width:100%" onclick="savePresets()">儲存變更</button>
    </div>

    <audio id="alarmSound" loop src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        let timers = JSON.parse(localStorage.getItem('myTimersV4')) || [];
        let presets = JSON.parse(localStorage.getItem('myPresets')) || ["煮麵", "深蹲", "休息"];
        let isMuted = false;
        let editingId = null;

        function init() {
            updatePresetDropdown();
            timers.forEach(t => { 
                t.isRunning = false; 
                if(!t.isOvertime) t.remainingSeconds = calculateTotal(t.h, t.m, t.s);
            });
            renderTimers();
        }

        // --- 靜音功能 ---
        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('muteBtn');
            btn.textContent = isMuted ? "🚫" : "🔊";
            if(isMuted) document.getElementById('alarmSound').pause();
        }

        // --- 常用清單管理 ---
        function openPresets() {
            document.getElementById('presetEditor').value = presets.join(', ');
            document.getElementById('presetModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
        }
        function closePresets() {
            document.getElementById('presetModal').style.display = 'none';
            document.getElementById('modalOverlay').style.display = 'none';
        }
        function savePresets() {
            const raw = document.getElementById('presetEditor').value;
            presets = raw.split(/[,，\n]/).map(s => s.trim()).filter(s => s !== "");
            localStorage.setItem('myPresets', JSON.stringify(presets));
            updatePresetDropdown();
            closePresets();
        }
        function updatePresetDropdown() {
            const select = document.getElementById('presetSelect');
            select.innerHTML = '<option value="">快速選擇任務</option>';
            presets.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p; opt.textContent = p;
                select.appendChild(opt);
            });
            select.onchange = (e) => { if(e.target.value) document.getElementById('newName').value = e.target.value; };
        }

        // --- 計時核心邏輯 ---
        function calculateTotal(h, m, s) { return (parseInt(h)||0)*3600 + (parseInt(m)||0)*60 + (parseInt(s)||0); }

        function addTimer() {
            const name = document.getElementById('newName').value || "任務";
            const h = document.getElementById('newHour').value || 0;
            const m = document.getElementById('newMin').value || 0;
            const s = document.getElementById('newSec').value || 0;
            timers.push({ id: Date.now(), name, h, m, s, remainingSeconds: calculateTotal(h, m, s), isRunning: false, isOvertime: false });
            saveAndRender();
        }

        function setEditing(id, state) {
            editingId = state ? id : null;
            if(!state) sortAndRender();
        }

        function updateTaskTime(id, field, val) {
            const t = timers.find(x => x.id === id);
            if (t) {
                t[field] = val;
                if (!t.isRunning && !t.isOvertime) t.remainingSeconds = calculateTotal(t.h, t.m, t.s);
                localStorage.setItem('myTimersV4', JSON.stringify(timers.map(({interval, ...rest}) => rest)));
            }
        }

        function toggleTimer(id) {
            const t = timers.find(x => x.id === id);
            if (t.isRunning) {
                clearInterval(t.interval);
                t.isRunning = false;
            } else {
                t.isRunning = true;
                editingId = null;
                t.interval = setInterval(() => {
                    t.remainingSeconds--;
                    if (t.remainingSeconds <= 0 && !t.isOvertime) {
                        t.isOvertime = true;
                        if(!isMuted) {
                            const audio = document.getElementById('alarmSound');
                            audio.currentTime = 0; audio.play();
                            setTimeout(() => audio.pause(), 6000);
                        }
                    }
                    if (editingId === null) sortAndRender();
                }, 1000);
            }
            renderTimers();
        }

        function resetTimer(id) {
            const t = timers.find(x => x.id === id);
            clearInterval(t.interval);
            t.isRunning = false; t.isOvertime = false;
            t.remainingSeconds = calculateTotal(t.h, t.m, t.s);
            saveAndRender();
        }

        function sortAndRender() {
            timers.sort((a, b) => {
                if (a.id === editingId) return 1;
                if (b.id === editingId) return -1;
                return a.remainingSeconds - b.remainingSeconds;
            });
            renderTimers();
            localStorage.setItem('myTimersV4', JSON.stringify(timers.map(({interval, ...rest}) => rest)));
        }

        function renderTimers() {
            const container = document.getElementById('timerContainer');
            container.innerHTML = '';
            timers.forEach(t => {
                const card = document.createElement('div');
                card.className = `timer-card ${t.isOvertime ? 'overtime' : ''} ${t.id == editingId ? 'is-editing' : ''}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <input class="timer-name" value="${t.name}" onchange="updateName(${t.id}, this.value)">
                        <button onclick="removeTimer(${t.id})" style="background:transparent; border:none; color:#94a3b8; cursor:pointer; font-size:1.2rem;">✕</button>
                    </div>
                    <div class="timer-display">${formatTime(t.remainingSeconds)}</div>
                    <div class="card-inputs" style="display:flex; justify-content:center; align-items:center; gap:5px; opacity:0.8;">
                        <input type="number" value="${t.h}" onfocus="setEditing(${t.id}, true)" onblur="setEditing(${t.id}, false)" onchange="updateTaskTime(${t.id}, 'h', this.value)">:
                        <input type="number" value="${t.m}" onfocus="setEditing(${t.id}, true)" onblur="setEditing(${t.id}, false)" onchange="updateTaskTime(${t.id}, 'm', this.value)">:
                        <input type="number" value="${t.s}" onfocus="setEditing(${t.id}, true)" onblur="setEditing(${t.id}, false)" onchange="updateTaskTime(${t.id}, 's', this.value)">
                    </div>
                    <div class="btn-group">
                        <button class="${t.isRunning ? 'btn-pause' : 'btn-start'}" onclick="toggleTimer(${t.id})">${t.isRunning ? '暫停' : '開始'}</button>
                        <button class="btn-reset" onclick="resetTimer(${t.id})">重置</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function formatTime(s) {
            const isNeg = s < 0; const absS = Math.abs(s);
            const hrs = Math.floor(absS / 3600);
            const mins = Math.floor((absS % 3600) / 60);
            const secs = absS % 60;
            let res = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (hrs > 0 || isNeg) res = `${hrs.toString().padStart(2, '0')}:${res}`;
            return `${isNeg ? '+' : ''}${res}`;
        }

        function updateName(id, val) {
            const t = timers.find(x => x.id === id);
            if (t) { t.name = val; localStorage.setItem('myTimersV4', JSON.stringify(timers.map(({interval, ...rest}) => rest))); }
        }

        function removeTimer(id) { timers = timers.filter(x => x.id !== id); saveAndRender(); }
        function saveAndRender() { localStorage.setItem('myTimersV4', JSON.stringify(timers.map(({interval, ...rest}) => rest))); renderTimers(); }
        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        init();
    </script>
</body>
</html>
