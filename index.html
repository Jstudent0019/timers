<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多重計時器 Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1c1e21;
            --primary: #1877f2;
            --danger: #ff4d4f;
            --success: #52c41a;
            --border: #dddfe2;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        [data-theme="dark"] {
            --bg: #18191a;
            --card-bg: #242526;
            --text: #e4e6eb;
            --border: #3e4042;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            transition: background 0.3s;
            display: flex; flex-direction: column; align-items: center; padding: 30px 15px;
            margin: 0;
        }

        .theme-toggle { position: fixed; top: 20px; right: 20px; font-size: 24px; cursor: pointer; z-index: 100; }

        h2 { font-weight: 800; margin-bottom: 25px; color: var(--primary); }

        /* 控制面板 */
        .controls { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; 
            box-shadow: var(--shadow); width: 100%; max-width: 500px;
            display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px;
        }
        .input-group { display: flex; gap: 8px; align-items: center; justify-content: center; }
        .input-group label { font-size: 0.8em; color: #888; margin-right: 2px; }
        
        input { 
            padding: 8px; border: 1px solid var(--border); border-radius: 6px; 
            background: var(--card-bg); color: var(--text);
        }
        input[type="number"] { width: 55px; text-align: center; }
        input[type="text"] { flex: 1; }

        /* 計時器列表 */
        .timer-list { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
        .timer-card { 
            background: var(--card-bg); padding: 18px; border-radius: 12px; 
            box-shadow: var(--shadow); border-left: 5px solid var(--primary);
            position: relative; transition: all 0.3s;
        }
        .timer-card.overtime { 
            border-left-color: var(--danger);
            background: rgba(255, 77, 79, 0.05);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 79, 0.2); } 70% { box-shadow: 0 0 0 8px rgba(255, 77, 79, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 79, 0); } }

        .timer-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .timer-name { border: none; font-size: 1.1em; font-weight: 600; background: transparent; width: 80%; }
        
        /* 時間設定區域 */
        .time-setting-inline { 
            display: flex; justify-content: center; gap: 5px; margin-bottom: 10px;
            font-size: 0.9em; align-items: center;
        }

        .timer-display { 
            font-size: 2.8em; font-family: 'JetBrains Mono', monospace; font-weight: 700;
            text-align: center; margin: 10px 0; color: var(--primary);
        }
        .overtime .timer-display { color: var(--danger); }

        /* 按鈕 */
        .btn-group { display: flex; justify-content: center; gap: 10px; }
        button { 
            cursor: pointer; padding: 8px 16px; border: none; border-radius: 6px; 
            font-weight: 600; transition: opacity 0.2s;
        }
        .btn-add { background: var(--primary); color: white; width: 100%; padding: 10px; }
        .btn-start { background: var(--success); color: white; }
        .btn-pause { background: #f39c12; color: white; }
        .btn-reset { background: #636e72; color: white; }
        .btn-del { background: transparent; color: #999; font-size: 1.2em; padding: 0 5px; }

        input:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>

    <h2>⏱️ Multi-Timer Pro</h2>

    <div class="controls">
        <input type="text" id="newName" placeholder="任務名稱 (例如: 健身)">
        <div class="input-group">
            <label>H</label><input type="number" id="newHour" value="0" min="0">
            <label>M</label><input type="number" id="newMin" value="5" min="0">
            <label>S</label><input type="number" id="newSec" value="0" min="0" max="59">
        </div>
        <button class="btn-add" onclick="addTimer()">新增計時器</button>
    </div>

    <div id="timerContainer" class="timer-list"></div>

    <audio id="alarmSound" loop src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        let timers = JSON.parse(localStorage.getItem('myTimersV2')) || [];
        
        function init() {
            // 初始化時強制停止所有計時
            timers.forEach(t => { 
                t.isRunning = false; 
                if(!t.isOvertime) t.remainingSeconds = calculateTotal(t.h, t.m, t.s);
            });
            renderTimers();
        }

        function calculateTotal(h, m, s) {
            return (parseInt(h)||0)*3600 + (parseInt(m)||0)*60 + (parseInt(s)||0);
        }

        function saveToLocal() {
            const data = timers.map(({interval, ...rest}) => rest);
            localStorage.setItem('myTimersV2', JSON.stringify(data));
        }

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        function addTimer() {
            const name = document.getElementById('newName').value || "新任務";
            const h = document.getElementById('newHour').value || 0;
            const m = document.getElementById('newMin').value || 0;
            const s = document.getElementById('newSec').value || 0;
            const total = calculateTotal(h, m, s);

            timers.push({
                id: Date.now(),
                name: name,
                h: h, m: m, s: s,
                remainingSeconds: total,
                isRunning: false,
                isOvertime: false
            });
            saveToLocal();
            renderTimers();
        }

        function updateTaskTime(id, field, val) {
            const t = timers.find(x => x.id === id);
            if (t) {
                t[field] = val;
                if (!t.isRunning && !t.isOvertime) {
                    t.remainingSeconds = calculateTotal(t.h, t.m, t.s);
                }
                saveToLocal();
                renderTimers();
            }
        }

        function toggleTimer(id) {
            const t = timers.find(x => x.id === id);
            if (t.isRunning) {
                clearInterval(t.interval);
                t.isRunning = false;
            } else {
                // 如果是從 0 開始，直接進入超時
                if (t.remainingSeconds === 0 && !t.isOvertime) t.isOvertime = true;
                
                t.isRunning = true;
                t.interval = setInterval(() => {
                    t.remainingSeconds--;
                    if (t.remainingSeconds <= 0 && !t.isOvertime) {
                        t.isOvertime = true;
                        playAlarm();
                    }
                    sortAndRender();
                }, 1000);
            }
            renderTimers();
        }

        function playAlarm() {
            const audio = document.getElementById('alarmSound');
            audio.currentTime = 0;
            audio.play();
            setTimeout(() => { audio.pause(); }, 6000);
        }

        function resetTimer(id) {
            const t = timers.find(x => x.id === id);
            clearInterval(t.interval);
            t.isRunning = false;
            t.isOvertime = false;
            t.remainingSeconds = calculateTotal(t.h, t.m, t.s);
            saveToLocal();
            renderTimers();
        }

        function sortAndRender() {
            timers.sort((a, b) => a.remainingSeconds - b.remainingSeconds);
            renderTimers();
            saveToLocal();
        }

        function renderTimers() {
            const container = document.getElementById('timerContainer');
            container.innerHTML = '';

            timers.forEach(t => {
                const card = document.createElement('div');
                card.className = `timer-card ${t.isOvertime ? 'overtime' : ''}`;
                
                card.innerHTML = `
                    <div class="timer-header">
                        <input class="timer-name" value="${t.name}" onchange="updateName(${t.id}, this.value)">
                        <button class="btn-del" onclick="removeTimer(${t.id})">✕</button>
                    </div>
                    
                    <div class="time-setting-inline">
                        <label>H</label><input type="number" value="${t.h}" ${t.isRunning?'disabled':''} onchange="updateTaskTime(${t.id}, 'h', this.value)">
                        <label>M</label><input type="number" value="${t.m}" ${t.isRunning?'disabled':''} onchange="updateTaskTime(${t.id}, 'm', this.value)">
                        <label>S</label><input type="number" value="${t.s}" ${t.isRunning?'disabled':''} onchange="updateTaskTime(${t.id}, 's', this.value)">
                    </div>

                    <div class="timer-display">${formatTime(t.remainingSeconds)}</div>

                    <div class="btn-group">
                        <button class="${t.isRunning ? 'btn-pause' : 'btn-start'}" onclick="toggleTimer(${t.id})">
                            ${t.isRunning ? '暫停' : '開始'}
                        </button>
                        <button class="btn-reset" onclick="resetTimer(${t.id})">重置</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function formatTime(s) {
            const isNeg = s < 0;
            const absS = Math.abs(s);
            const hrs = Math.floor(absS / 3600);
            const mins = Math.floor((absS % 3600) / 60);
            const secs = absS % 60;
            
            let res = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (hrs > 0 || isNeg) res = `${hrs.toString().padStart(2, '0')}:${res}`;
            return `${isNeg ? '+' : ''}${res}`;
        }

        function updateName(id, val) {
            const t = timers.find(x => x.id === id);
            if (t) { t.name = val; saveToLocal(); }
        }

        function removeTimer(id) {
            const t = timers.find(x => x.id === id);
            if(t && t.interval) clearInterval(t.interval);
            timers = timers.filter(x => x.id !== id);
            saveToLocal();
            renderTimers();
        }

        init();
    </script>
</body>
</html>
