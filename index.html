<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多重計時器 Grid Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1c1e21;
            --primary: #1877f2;
            --danger: #ff4d4f;
            --success: #52c41a;
            --border: #dddfe2;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        [data-theme="dark"] {
            --bg: #18191a;
            --card-bg: #242526;
            --text: #e4e6eb;
            --border: #3e4042;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* 防止全域捲動 */
        }

        /* 頂部控制區 - 保持精簡 */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .add-zone { display: flex; gap: 8px; align-items: center; }
        .add-zone input { padding: 6px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        .num-input { width: 45px; text-align: center; }
        
        /* 網格區域 - 核心優化 */
        #timerContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); /* 自動填滿，最小寬度 180px */
            gap: 10px;
            overflow-y: auto; /* 只讓內容區捲動 */
            padding-right: 5px;
            flex-grow: 1;
        }

        /* 迷你卡片設計 */
        .timer-card { 
            background: var(--card-bg); 
            padding: 10px; 
            border-radius: 10px; 
            box-shadow: var(--shadow); 
            border-top: 4px solid var(--primary);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            transition: transform 0.1s;
        }
        .timer-card.overtime { 
            border-top-color: var(--danger);
            background: rgba(255, 77, 79, 0.1);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .timer-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .timer-name { 
            border: none; font-size: 0.9em; font-weight: 600; 
            background: transparent; color: var(--text); width: 80%;
            overflow: hidden; text-overflow: ellipsis;
        }

        .timer-display { 
            font-size: 1.8em; /* 縮小字體以適應多格 */
            font-family: 'JetBrains Mono', monospace; 
            text-align: center; 
            margin: 5px 0; 
            color: var(--primary);
            font-weight: 600;
        }
        .overtime .timer-display { color: var(--danger); }

        .time-setting-inline {
            display: flex;
            justify-content: center;
            gap: 2px;
            font-size: 0.7em;
            margin-bottom: 8px;
        }
        .time-setting-inline input {
            width: 32px; border: none; background: rgba(0,0,0,0.05); 
            text-align: center; border-radius: 3px; color: var(--text);
        }

        .btn-group { display: flex; gap: 5px; }
        .btn-group button { flex: 1; font-size: 0.75em; padding: 5px; border-radius: 4px; border: none; cursor: pointer; color: white; }
        .btn-start { background: var(--success); }
        .btn-pause { background: #f39c12; }
        .btn-reset { background: #636e72; }
        .btn-del { background: transparent; color: #999; border: none; cursor: pointer; padding: 0; }

        /* 隱藏滾動條美化 */
        #timerContainer::-webkit-scrollbar { width: 6px; }
        #timerContainer::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        @media (max-width: 600px) {
            #timerContainer { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .timer-display { font-size: 1.5em; }
            header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 800; font-size: 1.2em; color: var(--primary);">⏱️ Multi-Grid</div>
        <div class="add-zone">
            <input type="text" id="newName" placeholder="任務名稱" style="width: 100px;">
            <input type="number" id="newHour" class="num-input" value="0" placeholder="H">
            <input type="number" id="newMin" class="num-input" value="5" placeholder="M">
            <input type="number" id="newSec" class="num-input" value="0" placeholder="S">
            <button onclick="addTimer()" style="background:var(--primary); color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer;">＋</button>
        </div>
        <div onclick="toggleTheme()" style="cursor:pointer; font-size: 20px;">🌓</div>
    </header>

    <div id="timerContainer"></div>

    <audio id="alarmSound" loop src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        let timers = JSON.parse(localStorage.getItem('myTimersGrid')) || [];
        
        function init() {
            timers.forEach(t => { 
                t.isRunning = false; 
                if(!t.isOvertime) t.remainingSeconds = calculateTotal(t.h, t.m, t.s);
            });
            renderTimers();
        }

        function calculateTotal(h, m, s) {
            return (parseInt(h)||0)*3600 + (parseInt(m)||0)*60 + (parseInt(s)||0);
        }

        function saveToLocal() {
            const data = timers.map(({interval, ...rest}) => rest);
            localStorage.setItem('myTimersGrid', JSON.stringify(data));
        }

        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function addTimer() {
            const name = document.getElementById('newName').value || "Task";
            const h = document.getElementById('newHour').value || 0;
            const m = document.getElementById('newMin').value || 0;
            const s = document.getElementById('newSec').value || 0;
            const total = calculateTotal(h, m, s);

            timers.push({
                id: Date.now(),
                name: name,
                h: h, m: m, s: s,
                remainingSeconds: total,
                isRunning: false,
                isOvertime: false
            });
            saveToLocal();
            renderTimers();
        }

        function updateTaskTime(id, field, val) {
            const t = timers.find(x => x.id === id);
            if (t) {
                t[field] = val;
                if (!t.isRunning && !t.isOvertime) t.remainingSeconds = calculateTotal(t.h, t.m, t.s);
                saveToLocal();
                renderTimers();
            }
        }

        function toggleTimer(id) {
            const t = timers.find(x => x.id === id);
            if (t.isRunning) {
                clearInterval(t.interval);
                t.isRunning = false;
            } else {
                t.isRunning = true;
                t.interval = setInterval(() => {
                    t.remainingSeconds--;
                    if (t.remainingSeconds <= 0 && !t.isOvertime) {
                        t.isOvertime = true;
                        document.getElementById('alarmSound').play();
                        setTimeout(() => document.getElementById('alarmSound').pause(), 5000);
                    }
                    sortAndRender();
                }, 1000);
            }
            renderTimers();
        }

        function resetTimer(id) {
            const t = timers.find(x => x.id === id);
            clearInterval(t.interval);
            t.isRunning = false;
            t.isOvertime = false;
            t.remainingSeconds = calculateTotal(t.h, t.m, t.s);
            saveToLocal();
            renderTimers();
        }

        function sortAndRender() {
            timers.sort((a, b) => a.remainingSeconds - b.remainingSeconds);
            renderTimers();
            saveToLocal();
        }

        function renderTimers() {
            const container = document.getElementById('timerContainer');
            container.innerHTML = '';

            timers.forEach(t => {
                const card = document.createElement('div');
                card.className = `timer-card ${t.isOvertime ? 'overtime' : ''}`;
                
                card.innerHTML = `
                    <div class="timer-header">
                        <input class="timer-name" value="${t.name}" onchange="updateName(${t.id}, this.value)">
                        <button class="btn-del" onclick="removeTimer(${t.id})">✕</button>
                    </div>
                    
                    <div class="timer-display">${formatTime(t.remainingSeconds)}</div>

                    <div class="time-setting-inline">
                        <input type="number" value="${t.h}" ${t.isRunning?'disabled':''} onchange="updateTaskTime(${t.id}, 'h', this.value)">:
                        <input type="number" value="${t.m}" ${t.isRunning?'disabled':''} onchange="updateTaskTime(${t.id}, 'm', this.value)">:
                        <input type="number" value="${t.s}" ${t.isRunning?'disabled':''} onchange="updateTaskTime(${t.id}, 's', this.value)">
                    </div>

                    <div class="btn-group">
                        <button class="${t.isRunning ? 'btn-pause' : 'btn-start'}" onclick="toggleTimer(${t.id})">
                            ${t.isRunning ? '暫' : '始'}
                        </button>
                        <button class="btn-reset" onclick="resetTimer(${t.id})">重置</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function formatTime(s) {
            const isNeg = s < 0;
            const absS = Math.abs(s);
            const hrs = Math.floor(absS / 3600);
            const mins = Math.floor((absS % 3600) / 60);
            const secs = absS % 60;
            let res = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (hrs > 0 || isNeg) res = `${hrs.toString().padStart(2, '0')}:${res}`;
            return `${isNeg ? '+' : ''}${res}`;
        }

        function updateName(id, val) {
            const t = timers.find(x => x.id === id);
            if (t) { t.name = val; saveToLocal(); }
        }

        function removeTimer(id) {
            const t = timers.find(x => x.id === id);
            if(t && t.interval) clearInterval(t.interval);
            timers = timers.filter(x => x.id !== id);
            saveToLocal();
            renderTimers();
        }

        init();
    </script>
</body>
</html>
